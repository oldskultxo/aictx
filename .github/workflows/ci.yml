name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest build
          python -m pip install -e .
      - name: Run unit tests
        run: pytest -q
      - name: Smoke flow
        run: |
          TMP_REPO="$(mktemp -d)"
          aictx init --repo "$TMP_REPO" --yes --no-register
          aictx boot --repo "$TMP_REPO" >/dev/null
          aictx packet --task "debug failing integration" >/dev/null
          aictx execution prepare --repo "$TMP_REPO" --request "review middleware behavior" --agent-id ci-agent --execution-id ci-1 > "$TMP_REPO/prepared.json"
          aictx execution finalize --prepared "$TMP_REPO/prepared.json" --success --result-summary "ci smoke" >/dev/null
      - name: Package build
        run: python -m build
